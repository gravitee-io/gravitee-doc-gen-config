outputs:
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/{{ .Plugin.ID }}/README.tmpl"
   target: README.md
   processExisting: true
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/POLICY_STUDIO_DOC.tmpl"
   target: docs/POLICY_STUDIO_DOC.md
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/{{ .Plugin.ID }}/README_produce.tmpl"
   target: gravitee-policy-kafka-produce-rules/README.md
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/{{ .Plugin.ID }}/README_fetch.tmpl"
   target: gravitee-policy-kafka-fetch-rules/README.md
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/{{ .Plugin.ID }}/README_create_topic.tmpl"
   target: gravitee-policy-kafka-create-topic-rules/README.md
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/{{ .Plugin.ID }}/README_alter_topic.tmpl"
   target: gravitee-policy-kafka-alter-topic-rules/README.md
chunks:
  - template: .docgen/overview.md
    required: true
  - template: gravitee-policy-kafka-produce-rules/.docgen/overview.md
    exportedAs: ProduceOverview
  - template: gravitee-policy-kafka-fetch-rules/.docgen/overview.md
    exportedAs: FetchOverview
  - template: gravitee-policy-kafka-create-topic-rules/.docgen/overview.md
    exportedAs: CreateTopicOverview
  - template: gravitee-policy-kafka-alter-topic-rules/.docgen/overview.md
    exportedAs: AlterTopicOverview
  - template: .docgen/usage.md
  - template: "{{ .RootDir }}/{{ .Plugin.Type }}/errors.tmpl"
    type: table
    data:
      table: .docgen/errors.yaml
      columns:
        - key: Key
        - params: Parameters
  - template: "{{ .RootDir }}/matrix.tmpl"
    type: table
    required: true
    data:
      table: .docgen/matrix.yaml
      columns:
        - plugin: Plugin version
        - apim: APIM
        - am: AM
        - cockpit: Cloud
        - java: Java version
        - comment: Comment
  - template: "{{ .RootDir }}/policy/phases.tmpl"
    required: true
  - template: "{{ .RootDir }}/configuration_options.tmpl"
    type: options
    required: false
    exportedAs: ProduceConfigurationOptions
    data:
      schema: gravitee-policy-kafka-produce-rules/target/classes/schemas/schema-form.json
  - template: "{{ .RootDir }}/configuration_options.tmpl"
    type: options
    required: false
    exportedAs: FetchConfigurationOptions
    data:
      schema: gravitee-policy-kafka-fetch-rules/target/classes/schemas/schema-form.json
  - template: "{{ .RootDir }}/configuration_options.tmpl"
    type: options
    required: false
    exportedAs: CreateTopicConfigurationOptions
    data:
      schema: gravitee-policy-kafka-create-topic-rules/target/classes/schemas/schema-form.json
  - template: "{{ .RootDir }}/configuration_options.tmpl"
    type: options
    required: false
    exportedAs: AlterTopicConfigurationOptions
    data:
      schema: gravitee-policy-kafka-alter-topic-rules/target/classes/schemas/schema-form.json
  - template: "{{ .RootDir }}/examples.tmpl"
    exportedAs: GenExamples
    type: gen-examples
    required: false
    data:
      examples: .docgen/examples.yaml
      schema: gravitee-policy-kafka-produce-rules/target/classes/schemas/schema-form.json
  - template: "{{ .RootDir }}/examples.tmpl"
    exportedAs: RawExamples
    type: raw-examples
    required: false
    data:
      examples: .docgen/examples.yaml
      schema: gravitee-policy-kafka-produce-rules/target/classes/schemas/schema-form.json
  - template: "{{ .RootDir }}/gateway_config.tmpl"
    type: code
    data:
      code: .docgen/gateway-config.yaml
  - template: CHANGELOG.md
    exportedAs: ChangeLog
    required: true
