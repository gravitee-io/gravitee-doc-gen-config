outputs:
 - template : "{{ .RootDir }}/{{ .Plugin.Type }}/README.tmpl"
   target: README.md
   processExisting: true
{{ if .Modules }}{{ range .Modules }} - template : "{{ $.RootDir }}/{{ $.Plugin.Type }}/POLICY_STUDIO_DOC_MODULE.tmpl"
   target: "{{ .Path }}/docs/POLICY_STUDIO_DOC.md"
   processExisting: true
   vars:
     moduleName: "{{ .Name }}"
     overviewChunk: "{{ .ExportedAs }}Overview"
     configChunk: "{{ .ExportedAs }}ConfigurationOptions"
{{ end }}{{ else }} - template : "{{ .RootDir }}/{{ .Plugin.Type }}/POLICY_STUDIO_DOC.tmpl"
   target: docs/POLICY_STUDIO_DOC.md
{{ end }}
chunks:
  - template: .docgen/overview.md
    required: true
  - template: .docgen/usage.md
  - template: "{{ .RootDir }}/{{ .Plugin.Type }}/errors.tmpl"
    type: table
    data:
      table: .docgen/errors.yaml
      columns:
        - key: Key
        - params: Parameters
  - template: "{{ .RootDir }}/matrix.tmpl"
    type: table
    required: true
    data:
      table: .docgen/matrix.yaml
      columns:
        - plugin: Plugin version
        - apim: APIM
        - am: AM
        - cockpit: Cloud
        - java: Java version
        - comment: Comment
  - template: "{{ .RootDir }}/policy/phases.tmpl"
    required: true
{{ if .Modules }}{{ range .Modules }}  - template: "{{ .Path }}/.docgen/overview.md"
    exportedAs: "{{ .ExportedAs }}Overview"
    required: true
  - template: "{{ $.RootDir }}/configuration_options.tmpl"
    type: options
    required: true
    exportedAs: "{{ .ExportedAs }}ConfigurationOptions"
    data:
      schema: "{{ .Path }}/target/classes/schemas/schema-form.json"
{{ end }}{{ else }}  - template: "{{ .RootDir }}/configuration_options.tmpl"
    type: options
    required: true
    data:
      schema: target/classes/schemas/schema-form.json
{{ end }}{{ if .Modules }}  - template: "{{ .RootDir }}/examples.tmpl"
    exportedAs: GenExamples
    type: gen-examples
    required: false
    data:
      examples: .docgen/examples.yaml
      schema: "{{ (index .Modules 0).Path }}/target/classes/schemas/schema-form.json"
  - template: "{{ .RootDir }}/examples.tmpl"
    exportedAs: RawExamples
    type: raw-examples
    required: false
    data:
      examples: .docgen/examples.yaml
      schema: "{{ (index .Modules 0).Path }}/target/classes/schemas/schema-form.json"
{{ else }}  - template: "{{ .RootDir }}/examples.tmpl"
    exportedAs: GenExamples
    type: gen-examples
    data:
      examples: .docgen/examples.yaml
      schema: target/classes/schemas/schema-form.json
    required: true
  - template: "{{ .RootDir }}/examples.tmpl"
    exportedAs: RawExamples
    type: raw-examples
    data:
      examples: .docgen/examples.yaml
      schema: target/classes/schemas/schema-form.json
    required: true
{{ end }}
  - template: "{{ .RootDir }}/gateway_config.tmpl"
    type: code
    data:
      code: .docgen/gateway-config.yaml
  - template: CHANGELOG.md
    exportedAs: ChangeLog
    required: true
